<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spoiclone- Web Player: Music for everyone</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/utility.css">
</head>

<body>
    <div class="container flex bg-black">
        <div class="left">
            <div class="close">
                <img class="invert" width="30px" src="img/close.svg" alt="">
            </div>
            <div class="home bg-gray rounded m-1 p-1">
                <div class="logo"><img class="invert" src="img/logo.svg" width="110px" alt=""></div>
                <ul>
                    <li class="flex"><img class="invert" src="img/home.svg" alt="home">Home</li>
                    <li class="flex"><img class="invert" src="img/search.svg" alt="search">Search</li>
                </ul>
            </div>
            <div class="library bg-gray rounded m-1 p-1">
                <div class="heading">
                    <img class="invert" src="img/playlist.svg" alt="">

                    <h2>Your Library</h2>

                </div>
                <div class="songlist">
                    <ul>

                    </ul>
                </div>
                <div class="footer">
                    <div>
                        <a>
                            <span>Legal</span>
                        </a>
                    </div>
                    <div>
                        <a >
                            <span>Safety &amp; Privacy Center</span>
                        </a>
                    </div>
                    <div>
                        <a>
                            <span>Privacy Policy</span>
                        </a>
                    </div>
                    <div>
                        <a >
                            <span>Cookies</span>
                        </a>
                    </div>
                    <div>
                        <a >
                            <span>About Ads</span>
                        </a>
                    </div>
                    <div>
                        <a >
                            <span>Accessibility</span>
                        </a>
                    </div>

                </div>
            </div>

        </div>
        <div class="right  bg-gray rounded ">
            <div class="header">
                <div class="nav">
                    
                        <img class="invert hamburger" width="30px" height="30px" src="img/hamburger.svg" alt="">
                    
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="#ffffff"
                        fill="none">
                        <path d="M15 6C15 6 9.00001 10.4189 9 12C8.99999 13.5812 15 18 15 18" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="#ffffff"
                        fill="none">
                        <path d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18" stroke="#ffffff"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </div>
                <div class="buttons">
                    <button class="signup-btn">Sign Up</button>
                    <button class="login-btn">Log In</button>
                </div>

            </div>
            <div class="spotifyPlaylists">
                <h1>Spotify Playlists</h1>
                <div class="cardcontainer">
                   
                   

                </div>

                <div class="playbar">
                    <div class="abovebar">
                        <div class="songinfo"></div>

                        <div class="songbuttons">
                            <img width="35px" id="previous" src="img/prevsong.svg" alt="prevsong">
                            <img width="35px" id="play" src="img/play.svg" alt="play">
                            <img width="35px" id="next" src="img/nextsong.svg" alt="nextsong">
                        </div>
                        <div class="timevol">
                            <div class="songtime"></div>
                        <div class="volume"><img width="25px" src="img/volume.svg" alt="">
                        <div class="range"><input type="range" name="volume"></div></div>
                        </div>


                    </div>
                    <div class="seekbar">

                        <div class="circle">

                        </div>
                    </div>


                </div>
            </div>
        </div>
    </div>
    <script src="JS/script.js"></script>
</body>
<img src="" alt="">

</html>
